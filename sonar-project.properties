# To set up Sonar cloud follow https://github.com/DEFRA/cdp-documentation/blob/main/howto/sonarcloud.md
# Update properties in this file as per the howto instructions
# Uncomment properties in this .github/workflows/check-pull-request.yml
# Uncomment properties in this .github/workflows/publish.yml
# Uncomment properties in this .github/workflows/publish-hotfix.yml

sonar.projectKey=DEFRA_pafs-backend-api
sonar.organization=defra

sonar.links.homepage=https://github.com/DEFRA/pafs-backend-api
sonar.links.ci=https://github.com/DEFRA/pafs-backend-api/actions
sonar.links.scm=https://github.com/DEFRA/pafs-backend-api
sonar.links.issue=https://github.com/DEFRA/pafs-backend-api/issues

sonar.sources=src/
sonar.exclusions=src/**/*.test.js,src/plugins/database/helpers/prisma-db-pull.js,src/common/constants/**/*.js,src/plugins/swagger/**
sonar.tests=src/
sonar.test.inclusions=src/**/*.test.js

sonar.javascript.lcov.reportPaths=./coverage/lcov.info

# Exclude pure data files from CPD — column map arrays are structurally repetitive by nature
sonar.cpd.exclusions=src/plugins/downloads/helpers/fcerm1/fcerm1-legacy-columns.js,src/plugins/downloads/helpers/fcerm1/fcerm1-new-columns.js
