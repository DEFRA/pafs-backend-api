services:
  # floci is a replacement for localstack. It emulates AWS resources (sqs, sns,
  # s3 etc) for local development
  # See: https://floci.io for more details
  floci:
    image: hectorvent/floci:latest-aws
    ports:
      - "4566:4566"
    env_file:
      - "compose/aws.env"
    environment:
      FLOCI_DEFAULT_REGION: eu-west-2
    volumes:
      - ./compose/floci/start.d:/etc/floci/init/start.d:ro
    networks:
      - cdp-tenant

  redis:
    image: redis:7.2.3-alpine3.18
    ports:
      - "6379:6379"
    networks:
      - cdp-tenant

  mongodb:
    image: mongo:7.0.28
    networks:
      - cdp-tenant
    ports:
      - "27017:27017"
    volumes:
      - ./compose/mongo:/docker-entrypoint-initdb.d:ro
      - mongodb-data:/data
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 40s

  ################################################################################

  # frontend:
  #   image: defradigital/frontend:${FRONTEND_VERSION:-latest}
  #   ports:
  #     - '3000:3000'
  #   links:
  #     - 'floci:floci'
  #     - 'redis:redis'
  #   depends_on:
  #     floci:
  #       condition: service_healthy
  #     redis:
  #       condition: service_started
  #   env_file:
  #     - 'compose/aws.env'
  #   environment:
  #     PORT: 3000
  #     NODE_ENV: development
  #     REDIS_HOST: redis
  #   networks:
  #     - cdp-tenant

  pafs-backend-api:
    build:
      context: .
      target: development
    ports:
      - "3001:3001"
    links:
      - "floci:floci"
      - "mongodb:mongodb"
    depends_on:
      floci:
        condition: service_started
      mongodb:
        condition: service_started
    env_file:
      - "compose/aws.env"
    environment:
      PORT: 3001
      NODE_ENV: development
      MONGO_URI: mongodb://mongodb:27017/
    networks:
      - cdp-tenant
    volumes:
      - ./src:/home/node/src
      - ./package.json:/home/node/package.json

################################################################################

volumes:
  mongodb-data:

networks:
  cdp-tenant:
    driver: bridge
    name: cdp-tenant
